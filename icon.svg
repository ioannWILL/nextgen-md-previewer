<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#0066cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- Document shape -->
  <rect x="24" y="20" width="80" height="88" rx="4" fill="white" opacity="0.95"/>
  <!-- MD text -->
  <text x="64" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0066cc" text-anchor="middle">.md</text>
  <!-- Cursor/edit indicator -->
  <rect x="44" y="70" width="40" height="3" fill="#0066cc" opacity="0.6"/>
  <rect x="44" y="78" width="28" height="3" fill="#0066cc" opacity="0.4"/>
  <rect x="44" y="86" width="34" height="3" fill="#0066cc" opacity="0.4"/>
  <!-- Edit pencil accent -->
  <g transform="translate(82, 82) rotate(-45)">
    <rect x="0" y="0" width="6" height="24" rx="1" fill="#ff9500"/>
    <polygon points="3,24 0,30 6,30" fill="#ff9500"/>
  </g>
</svg>
